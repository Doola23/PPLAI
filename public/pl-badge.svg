<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 44">
  <!-- Shield -->
  <path d="M20 2 L37 8 L37 22 Q37 34 20 42 Q3 34 3 22 L3 8 Z" fill="#38003C"/>
  <!-- Crown base -->
  <rect x="11" y="17" width="18" height="2.5" rx="1" fill="#EAFF00"/>
  <!-- Crown points -->
  <polygon points="11,17 13.5,10 16,15 20,9 24,15 26.5,10 29,17" fill="#EAFF00"/>
  <!-- Crown gems -->
  <circle cx="20" cy="10.5" r="1.2" fill="#E8003D"/>
  <circle cx="14" cy="12" r="0.8" fill="#E8003D"/>
  <circle cx="26" cy="12" r="0.8" fill="#E8003D"/>
  <!-- Lion body (stylized) -->
  <ellipse cx="20" cy="29" rx="6" ry="7" fill="#EAFF00"/>
  <!-- Lion head -->
  <circle cx="20" cy="25" r="5" fill="#EAFF00"/>
  <!-- Eyes -->
  <circle cx="18.2" cy="24.2" r="0.9" fill="#38003C"/>
  <circle cx="21.8" cy="24.2" r="0.9" fill="#38003C"/>
  <!-- Nose -->
  <ellipse cx="20" cy="25.8" rx="0.9" ry="0.6" fill="#C8940A"/>
  <!-- Mouth -->
  <path d="M18.2 26.8 Q20 28 21.8 26.8" fill="none" stroke="#38003C" stroke-width="0.7" stroke-linecap="round"/>
  <!-- Mane highlights -->
  <path d="M15 22 Q13 24 14.5 27" fill="none" stroke="#C8940A" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M25 22 Q27 24 25.5 27" fill="none" stroke="#C8940A" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Tail (curled) -->
  <path d="M26 34 Q30 32 28 38 Q26 36 28 35" fill="none" stroke="#EAFF00" stroke-width="1.4" stroke-linecap="round"/>
</svg>
